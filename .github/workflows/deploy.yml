env:
  DIRECTORY: .output

name: Deploy

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:
    inputs:
      submit_chrome:
        description: 'Submit to Chrome Web Store'
        type: boolean
        default: false
      submit_firefox:
        description: 'Submit to Firefox Addon Store'
        type: boolean
        default: false
      submit_edge:
        description: 'Submit to Edge Addon Store'
        type: boolean
        default: false
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_changed: ${{ steps.check_version.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for version change
        id: check_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version_changed=1" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1..HEAD | grep -q '^package\.json$'; then
            NEW_VERSION=$(jq -r .version package.json)
            LATEST_TAG=$(git tag --sort=-v:refname | head -n1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION_CHANGED=1
            elif [ "v$NEW_VERSION" != "$LATEST_TAG" ]; then
              VERSION_CHANGED=1
            else
              VERSION_CHANGED=0
            fi
            echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=0" >> "$GITHUB_OUTPUT"
          fi
      - name: Get version
        if: ${{ steps.check_version.outputs.version_changed == '1' }}
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
  submit:
    needs: version
    if: ${{ needs.version.outputs.version_changed == '1' }}
    runs-on: ubuntu-latest
    steps:
      # for cws-patch.sh/gen-icons.sh in chrome_submit
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 'latest'
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Zip extensions
        run: |
          pnpm run zip &&
          pnpm run zip:firefox
      # needed since chrome webstore rejected the submission due to "name matches with either prefix or suffix of popular names"
      - name: Patch chrome zip
        run: |
          ./cws-patch.sh ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-chrome.zip
      - name: Upload archives as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips-v${{ needs.version.outputs.version }}
          path: |
            ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-chrome.zip
            ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-firefox.zip
            ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-sources.zip
            ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-chrome-patched.zip
      - name: Submit to Chrome Web Store
        continue-on-error: true
        id: chrome_submit
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.submit_chrome }}
        run: |
          pnpm wxt submit \
            --chrome-zip ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-chrome-patched.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      - name: Submit to Firefox Addon Store
        continue-on-error: true
        id: firefox_submit
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.submit_firefox }}
        run: |
          pnpm wxt submit \
            --firefox-zip ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-firefox.zip \
            --firefox-sources-zip ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
      - name: Submit to Edge Addon Store
        continue-on-error: true
        id: edge_submit
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.submit_edge }}
        run: |
          pnpm wxt submit \
            --edge-zip ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-chrome.zip
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
      - name: Check submission results
        run: |
          echo "Chrome submission: ${{ steps.chrome_submit.outcome }}"
          echo "Firefox submission: ${{ steps.firefox_submit.outcome }}"
          echo "Edge submission: ${{ steps.edge_submit.outcome }}"
          FAILED=0
          [ "${{ steps.chrome_submit.outcome }}" == "failure" ] && FAILED=$((FAILED+1)) && echo "::warning::Chrome submission failed"
          [ "${{ steps.firefox_submit.outcome }}" == "failure" ] && FAILED=$((FAILED+1)) && echo "::warning::Firefox submission failed"
          [ "${{ steps.edge_submit.outcome }}" == "failure" ] && FAILED=$((FAILED+1)) && echo "::warning::Edge submission failed"
          if [ "$FAILED" == "3" ]; then
            echo "::error::All store submissions failed"
            exit 1
          elif [ "$FAILED" == "0" ]; then
            echo "::notice::All submissions succeeded"
          fi
      - name: Create Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ needs.version.outputs.version }}'
          name: 'v${{ needs.version.outputs.version }}'
          draft: false
          prerelease: false
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
          files: |
            ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-chrome.zip
            ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-firefox.zip
            ${{ env.DIRECTORY }}/${{ github.event.repository.name }}-${{ needs.version.outputs.version }}-sources.zip
